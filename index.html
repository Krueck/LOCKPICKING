<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lockpicking Challenge</title>
    <style>
        :root {
            --bg-color: #121212;
            --gold-color: #c9a730;
            --text-color: #f0f0f0;
            --danger-color: #ff4444;
            --ui-bg: rgba(0, 0, 0, 0.9);
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        /* Status Anzeige oben */
        #status-bar {
            position: absolute;
            top: 20px;
            display: flex;
            gap: 10px;
            font-size: 1.2em;
            color: var(--gold-color);
            z-index: 20;
        }

        .pick-icon {
            display: inline-block;
            width: 10px;
            height: 30px;
            background: linear-gradient(to bottom, #888, #444);
            border-radius: 2px;
            border: 1px solid #000;
        }

        .pick-icon.broken {
            opacity: 0.2;
            transform: rotate(45deg);
        }

        #game-container {
            position: relative;
            width: 90vw;
            max-width: 400px;
            height: 90vw;
            max-height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #lock-casing {
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, #777, #1a1a1a);
            border: 8px solid #2a2a2a;
            border-radius: 50%;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
        }

        #lock-cylinder {
            width: 45%;
            height: 45%;
            background: radial-gradient(circle, #aaa, #333);
            border: 4px solid #111;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(0deg);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease-out;
        }

        #keyhole {
            width: 10%;
            height: 40%;
            background-color: #050505;
            border-radius: 4px;
        }

        #pick {
            position: absolute;
            width: 4px;
            height: 60%;
            background: linear-gradient(to top, #666, #ccc);
            bottom: 50%;
            left: calc(50% - 2px);
            transform-origin: bottom center;
            pointer-events: none;
            z-index: 10;
        }

        #mobile-rotate-btn {
            display: none;
            margin-top: 25px;
            padding: 15px 40px;
            font-size: 1.2em;
            background-color: var(--gold-color);
            color: #000;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            touch-action: manipulation;
        }

        @media (pointer: coarse) { #mobile-rotate-btn { display: block; } }

        /* Overlays */
        .overlay {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--ui-bg);
            padding: 30px;
            border: 3px solid var(--gold-color);
            border-radius: 15px;
            text-align: center;
            z-index: 100;
            width: 80%;
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        .overlay h2 { color: var(--gold-color); margin-top: 0; }
        #fail-screen { border-color: var(--danger-color); }
        #fail-screen h2 { color: var(--danger-color); }

        .coords {
            font-size: 1.6em;
            color: var(--gold-color);
            font-weight: bold;
            margin: 20px 0;
        }

        button {
            padding: 10px 20px;
            cursor: pointer;
            background: #444;
            color: white;
            border: none;
            border-radius: 5px;
        }

        .shake { animation: shake 0.1s infinite; }
        @keyframes shake {
            0% { margin-left: 0; }
            25% { margin-left: 2px; }
            75% { margin-left: -2px; }
            100% { margin-left: 0; }
        }
    </style>
</head>
<body>

    <div id="status-bar">
        <span>Dietriche:</span>
        <div id="picks-container">
            <div class="pick-icon"></div>
            <div class="pick-icon"></div>
            <div class="pick-icon"></div>
            <div class="pick-icon"></div>
            <div class="pick-icon"></div>
        </div>
    </div>

    <div id="ui" style="text-align:center;">
        <h1 style="color:var(--gold-color); font-size:1.2em;">Schloss knacken</h1>
        <p id="hint-text" style="font-size:0.8em; opacity:0.7;">Finde den Sweetspot und drehe vorsichtig.</p>
    </div>

    <div id="game-container">
        <div id="lock-casing">
            <div id="lock-cylinder">
                <div id="keyhole"></div>
            </div>
        </div>
        <div id="pick"></div>

        <!-- Erfolg Screen -->
        <div id="success-screen" class="overlay">
            <h2>Geknackt!</h2>
            <p>Die Koordinaten:</p>
            <div class="coords">N 52° 32.906′<br>E 13° 02.140′</div>
            <button onclick="location.reload()">Beenden</button>
        </div>

        <!-- Fail Screen -->
        <div id="fail-screen" class="overlay">
            <h2>Abgebrochen!</h2>
            <p>Alle Dietriche sind zerbrochen.</p>
            <button onclick="location.reload()">Neuer Versuch</button>
        </div>
    </div>

    <button id="mobile-rotate-btn">DREHEN</button>

    <script>
        const pick = document.getElementById('pick');
        const cylinder = document.getElementById('lock-cylinder');
        const casing = document.getElementById('lock-casing');
        const rotateBtn = document.getElementById('mobile-rotate-btn');
        const pickIcons = document.querySelectorAll('.pick-icon');

        // Spielwerte
        let attempts = 5;
        let pickDurability = 100; // Aktueller Dietrich
        let solved = false;
        let gameOver = false;
        let isTrying = false;
        let cylinderRotation = 0;
        let pickAngle = 0;
        const sweetSpot = Math.floor(Math.random() * 140) - 70; // -70 bis 70
        const tolerance = 10;

        // Audio Setup
        let audioCtx;
        const initAudio = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); };
        const playSound = (freq, duration, type, vol) => {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + duration);
        };

        const soundScrape = () => playSound(150, 0.05, 'triangle', 0.02);
        const soundCreak = () => playSound(60 + cylinderRotation, 0.1, 'sawtooth', 0.02);
        const soundBlock = () => playSound(400, 0.05, 'square', 0.05);
        const soundBreak = () => playSound(150, 0.2, 'square', 0.2);
        const soundWin = () => { playSound(523, 0.1, 'sine', 0.1); setTimeout(()=>playSound(659, 0.3, 'sine', 0.1), 100); };

        // Steuerung
        function updatePickPos(x, y) {
            if (solved || gameOver || isTrying) return;
            initAudio();
            const box = casing.getBoundingClientRect();
            const angle = Math.atan2(y - (box.top + box.height/2), x - (box.left + box.width/2)) * (180/Math.PI) + 90;
            let newAngle = Math.max(-90, Math.min(90, angle));
            if (Math.abs(newAngle - pickAngle) > 2) soundScrape();
            pickAngle = newAngle;
            pick.style.transform = `rotate(${pickAngle}deg)`;
        }

        document.addEventListener('mousemove', (e) => updatePickPos(e.clientX, e.clientY));
        casing.addEventListener('touchmove', (e) => { e.preventDefault(); updatePickPos(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        
        const startAction = () => { if(!solved && !gameOver) { initAudio(); isTrying = true; } };
        const stopAction = () => { 
            isTrying = false; 
            if(!solved) {
                cylinderRotation = 0;
                cylinder.style.transform = `translate(-50%, -50%) rotate(0deg)`;
                cylinder.classList.remove('shake');
            }
        };

        document.addEventListener('keydown', (e) => { if(e.code === 'Space') startAction(); });
        document.addEventListener('keyup', (e) => { if(e.code === 'Space') stopAction(); });
        rotateBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startAction(); });
        rotateBtn.addEventListener('touchend', stopAction);

        // Game Loop
        function loop() {
            if (solved || gameOver) return;

            if (isTrying) {
                const diff = Math.abs(pickAngle - sweetSpot);
                let maxRot = Math.max(5, 90 - (diff * 10));

                if (cylinderRotation < maxRot) {
                    if (cylinderRotation < 90) {
                        cylinderRotation += 1.5;
                        soundCreak();
                    } else {
                        win();
                    }
                } else {
                    // Blockiert & Dietrich nimmt Schaden
                    cylinder.classList.add('shake');
                    soundBlock();
                    pickDurability -= 1.5; // Dietrich nutzt sich ab
                    
                    if (navigator.vibrate) navigator.vibrate(10);

                    if (pickDurability <= 0) {
                        breakPick();
                    }
                }
                cylinder.style.transform = `translate(-50%, -50%) rotate(${cylinderRotation}deg)`;
            }
            requestAnimationFrame(loop);
        }

        function breakPick() {
            stopAction();
            soundBreak();
            if (navigator.vibrate) navigator.vibrate(200);
            
            attempts--;
            pickIcons[attempts].classList.add('broken');
            pickDurability = 100;

            if (attempts <= 0) {
                gameOver = true;
                document.getElementById('fail-screen').style.display = 'block';
                rotateBtn.style.display = 'none';
            }
        }

        function win() {
            solved = true;
            soundWin();
            document.getElementById('success-screen').style.display = 'block';
            rotateBtn.style.display = 'none';
        }

        loop();
    </script>
</body>
</html>
